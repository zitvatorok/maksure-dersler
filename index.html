<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Maksure">
<meta name="theme-color" content="#0f0d0a">
<title>Maksure Dersler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0d0a;
  --bg2: #1a1710;
  --bg3: #242018;
  --gold: #c9a84c;
  --gold2: #e8c96a;
  --gold-dim: #7a6330;
  --text: #f0e8d5;
  --text2: #a89878;
  --text3: #6b5f47;
  --green: #4a7c59;
  --red: #8b3a3a;
  --r: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family:'Tajawal',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  min-height:-webkit-fill-available;
  overflow-x:hidden;
}
.screen { display:none; flex-direction:column; min-height:100vh; min-height:-webkit-fill-available; }
.screen.active { display:flex; }

/* ── LOGIN ── */
#screen-login {
  align-items:center;
  justify-content:center;
  padding:32px 24px;
  background:radial-gradient(ellipse at 50% 20%, #2a2010 0%, #0f0d0a 70%);
  gap:0;
}
.login-logo {
  font-family:'Amiri',serif;
  font-size:56px;
  color:var(--gold);
  text-shadow:0 0 40px rgba(201,168,76,0.3);
  margin-bottom:6px;
}
.login-sub {
  font-size:12px;
  color:var(--text3);
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:40px;
}
.login-ornament {
  width:80px; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin-bottom:40px;
}
.login-card {
  width:100%;
  max-width:340px;
  background:var(--bg2);
  border:1px solid rgba(201,168,76,0.15);
  border-radius:16px;
  padding:28px 24px;
  display:flex;
  flex-direction:column;
  gap:16px;
}
.login-field {
  display:flex;
  flex-direction:column;
  gap:6px;
}
.login-label {
  font-size:11px;
  color:var(--gold);
  letter-spacing:2px;
  text-transform:uppercase;
}
.login-input {
  background:var(--bg3);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;
  padding:13px 16px;
  color:var(--text);
  font-size:15px;
  font-family:'Tajawal',sans-serif;
  outline:none;
  transition:border-color 0.2s;
}
.login-input:focus { border-color:rgba(201,168,76,0.4); }
.login-btn {
  margin-top:4px;
  padding:15px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#1a1410;
  border:none;
  border-radius:10px;
  font-family:'Tajawal',sans-serif;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.login-btn:active { transform:scale(0.98); }
.login-btn:disabled { opacity:0.6; pointer-events:none; }
.login-note {
  font-size:12px;
  color:var(--text3);
  text-align:center;
  line-height:1.6;
  margin-top:8px;
}
.login-error {
  background:rgba(139,58,58,0.15);
  border:1px solid rgba(139,58,58,0.3);
  border-radius:8px;
  padding:10px 14px;
  font-size:13px;
  color:#e08080;
  display:none;
}

/* ── TOPBAR ── */
.topbar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px;
  background:var(--bg2);
  border-bottom:1px solid rgba(201,168,76,0.12);
  position:sticky; top:0; z-index:100;
  flex-shrink:0;
}
.topbar-title { font-family:'Amiri',serif; font-size:20px; color:var(--gold); }
.topbar-btn {
  background:none; border:none;
  color:var(--text2); font-size:20px;
  cursor:pointer; padding:4px 8px;
  border-radius:8px; transition:color 0.2s;
  font-family:'Tajawal',sans-serif;
}
.topbar-btn:active { color:var(--gold); }

/* ── HOME ── */
#screen-home { flex-direction:column; }
.home-scroll { flex:1; overflow-y:auto; padding:16px; }

.resume-card {
  background:linear-gradient(135deg,#2a1f0e,#1a1710);
  border:1px solid rgba(201,168,76,0.25);
  border-radius:var(--r);
  padding:16px 18px;
  margin-bottom:18px;
  cursor:pointer;
  transition:all 0.2s;
  position:relative;
  overflow:hidden;
  display:none;
}
.resume-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));
}
.resume-card:active { transform:scale(0.99); }
.resume-label { font-size:10px; color:var(--gold); letter-spacing:3px; text-transform:uppercase; margin-bottom:6px; }
.resume-title { font-family:'Amiri',serif; font-size:17px; color:var(--text); margin-bottom:3px; }
.resume-meta { font-size:12px; color:var(--text2); margin-bottom:10px; }
.prog-bar { height:3px; background:var(--bg3); border-radius:2px; overflow:hidden; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2)); border-radius:2px; transition:width 0.4s; }

.search-wrap { position:relative; margin-bottom:10px; }
.search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:15px; pointer-events:none; }
.search-input {
  width:100%; background:var(--bg2);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:10px; padding:11px 14px 11px 38px;
  color:var(--text); font-size:14px;
  font-family:'Tajawal',sans-serif; outline:none;
}
.search-input:focus { border-color:rgba(201,168,76,0.25); }

.cat-row {
  display:flex; gap:7px; overflow-x:auto;
  padding:2px 0 12px; scrollbar-width:none;
}
.cat-row::-webkit-scrollbar { display:none; }
.cat-btn {
  white-space:nowrap; padding:6px 13px;
  border-radius:20px; background:var(--bg2);
  border:1px solid rgba(255,255,255,0.07);
  color:var(--text2); font-size:12px;
  font-family:'Tajawal',sans-serif;
  cursor:pointer; transition:all 0.15s; flex-shrink:0;
}
.cat-btn.active {
  background:rgba(201,168,76,0.12);
  border-color:rgba(201,168,76,0.35);
  color:var(--gold);
}

.sec-row {
  display:flex; align-items:center;
  justify-content:space-between; margin-bottom:10px;
}
.sec-title { font-size:10px; color:var(--gold); letter-spacing:3px; text-transform:uppercase; }
.sec-count { font-size:12px; color:var(--text3); }

.lesson-list { display:flex; flex-direction:column; gap:7px; }
.lesson-item {
  background:var(--bg2);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:var(--r);
  padding:13px 15px;
  display:flex; align-items:center; gap:12px;
  cursor:pointer; transition:all 0.15s;
}
.lesson-item:active { background:var(--bg3); }
.lesson-item.playing { border-color:rgba(201,168,76,0.35); background:linear-gradient(135deg,#201a0e,#1a1710); }
.lesson-item.done { opacity:0.55; }
.l-num {
  width:34px; height:34px; border-radius:50%;
  background:var(--bg3); display:flex;
  align-items:center; justify-content:center;
  font-size:12px; color:var(--text3); flex-shrink:0;
}
.lesson-item.playing .l-num { background:var(--gold); color:#1a1410; font-size:15px; }
.lesson-item.done .l-num { background:rgba(74,124,89,0.2); color:var(--green); }
.l-info { flex:1; min-width:0; }
.l-name { font-size:13px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.l-meta { font-size:11px; color:var(--text3); margin-top:2px; }
.lesson-item.playing .l-name { color:var(--gold2); }
.l-tag {
  font-size:10px; padding:2px 8px; border-radius:20px;
  background:rgba(201,168,76,0.08); color:var(--gold-dim); white-space:nowrap; flex-shrink:0;
}
.l-tag.done-tag { background:rgba(74,124,89,0.12); color:var(--green); }

.empty-state { text-align:center; padding:48px 20px; color:var(--text3); }
.empty-icon { font-size:44px; margin-bottom:14px; opacity:0.35; }
.empty-text { font-size:14px; line-height:1.7; }

/* ── PLAYER ── */
#screen-player { flex-direction:column; }
.player-scroll { flex:1; overflow-y:auto; padding:20px 18px; }

.p-header { text-align:center; margin-bottom:28px; }
.p-cat { font-size:10px; color:var(--gold); letter-spacing:3px; text-transform:uppercase; margin-bottom:8px; }
.p-title { font-family:'Amiri',serif; font-size:22px; color:var(--text); line-height:1.45; }

.artwork {
  width:180px; height:180px; margin:0 auto 28px;
  border-radius:50%;
  background:radial-gradient(circle,#2a2010,#1a1410);
  border:2px solid rgba(201,168,76,0.25);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 50px rgba(201,168,76,0.06);
  position:relative;
}
.artwork.spinning { animation:spin 8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.artwork-symbol { font-family:'Amiri',serif; font-size:58px; color:var(--gold); opacity:0.55; }
.artwork-dot {
  position:absolute; width:18px; height:18px;
  background:var(--bg); border:2px solid rgba(201,168,76,0.35);
  border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%);
}

.prog-wrap { margin-bottom:6px; cursor:pointer; padding:8px 0; }
.prog-track { height:4px; background:var(--bg3); border-radius:2px; position:relative; overflow:hidden; }
.prog-track-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold2)); border-radius:2px; transition:width 0.5s linear; pointer-events:none; }
.times { display:flex; justify-content:space-between; font-size:11px; color:var(--text3); margin-top:5px; }

.controls {
  display:flex; align-items:center;
  justify-content:center; gap:20px; margin:20px 0 18px;
}
.ctrl {
  background:none; border:none; color:var(--text2);
  font-size:26px; cursor:pointer; padding:8px;
  transition:all 0.15s; border-radius:50%;
}
.ctrl:active { color:var(--gold); transform:scale(0.9); }
.ctrl-play {
  width:62px; height:62px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none; border-radius:50%; color:#1a1410;
  font-size:24px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 18px rgba(201,168,76,0.3);
  transition:all 0.15s;
}
.ctrl-play:active { transform:scale(0.94); }

.extras {
  display:flex; align-items:center;
  justify-content:space-between; padding:0 4px; margin-bottom:20px;
}
.speed-btn {
  background:var(--bg3); border:1px solid rgba(201,168,76,0.2);
  color:var(--gold); padding:6px 13px; border-radius:20px;
  font-size:13px; font-weight:700; cursor:pointer;
  font-family:'Tajawal',sans-serif;
}
.vol-wrap { display:flex; align-items:center; gap:7px; color:var(--text3); font-size:15px; }
.vol-slider {
  -webkit-appearance:none; width:75px; height:4px;
  background:var(--bg3); border-radius:2px; outline:none;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance:none; width:13px; height:13px;
  border-radius:50%; background:var(--gold); cursor:pointer;
}

.done-btn {
  width:100%; padding:13px;
  background:rgba(74,124,89,0.12);
  border:1px solid rgba(74,124,89,0.28);
  color:var(--green); border-radius:var(--r);
  font-family:'Tajawal',sans-serif; font-size:14px;
  font-weight:500; cursor:pointer; transition:all 0.2s; margin-bottom:10px;
}
.done-btn:active { background:rgba(74,124,89,0.22); }
.done-btn.undone { background:rgba(139,58,58,0.08); border-color:rgba(139,58,58,0.25); color:#e08080; }

/* ── ADD ── */
#screen-add { flex-direction:column; }
.add-scroll { flex:1; padding:22px 18px; overflow-y:auto; }
.field { margin-bottom:18px; }
.field-lbl { font-size:10px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; margin-bottom:7px; display:block; }
.field-inp {
  width:100%; background:var(--bg2);
  border:1px solid rgba(201,168,76,0.15);
  border-radius:var(--r); padding:13px 15px;
  color:var(--text); font-size:14px;
  font-family:'Tajawal',sans-serif; outline:none; transition:border-color 0.2s;
}
.field-inp:focus { border-color:rgba(201,168,76,0.4); }
.field-inp::placeholder { color:var(--text3); }
.save-btn {
  width:100%; padding:15px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#1a1410; border:none; border-radius:var(--r);
  font-family:'Tajawal',sans-serif; font-size:15px;
  font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:4px;
}
.save-btn:active { transform:scale(0.98); }
.divider { border-top:1px solid rgba(255,255,255,0.06); margin:28px 0 20px; }
.util-btn {
  width:100%; padding:11px; background:var(--bg2);
  border:1px solid rgba(255,255,255,0.08); color:var(--text2);
  border-radius:var(--r); font-family:'Tajawal',sans-serif;
  font-size:13px; cursor:pointer; margin-bottom:7px;
}
.logout-btn {
  width:100%; padding:11px; background:rgba(139,58,58,0.08);
  border:1px solid rgba(139,58,58,0.2); color:#e08080;
  border-radius:var(--r); font-family:'Tajawal',sans-serif;
  font-size:13px; cursor:pointer; margin-top:4px;
}

/* ── LOADING OVERLAY ── */
.overlay {
  position:fixed; inset:0;
  background:rgba(15,13,10,0.85);
  display:none; align-items:center; justify-content:center;
  flex-direction:column; gap:16px; z-index:999;
}
.overlay.show { display:flex; }
.spinner {
  width:40px; height:40px;
  border:3px solid rgba(201,168,76,0.2);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
.overlay-text { font-size:14px; color:var(--text2); }

/* ── BOTTOM NAV ── */
.bnav {
  display:flex; background:var(--bg2);
  border-top:1px solid rgba(201,168,76,0.08);
  padding:6px 0;
  padding-bottom:max(6px,env(safe-area-inset-bottom));
  flex-shrink:0;
}
.bnav-item {
  flex:1; display:flex; flex-direction:column;
  align-items:center; gap:3px; padding:5px 0;
  cursor:pointer; color:var(--text3); font-size:10px;
  letter-spacing:0.5px; border:none; background:none;
  font-family:'Tajawal',sans-serif; transition:all 0.15s;
}
.bnav-item .icon { font-size:21px; transition:all 0.15s; }
.bnav-item.active { color:var(--gold); }
.bnav-item.active .icon { transform:translateY(-2px); }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:85px; left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--bg3); border:1px solid rgba(201,168,76,0.25);
  color:var(--text); padding:11px 22px; border-radius:40px;
  font-size:13px; opacity:0; transition:all 0.3s;
  pointer-events:none; white-space:nowrap; z-index:998;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:2px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-logo">مقصوره</div>
  <div class="login-sub">Ders Takip</div>
  <div class="login-ornament"></div>
  <div class="login-card">
    <div class="login-field">
      <label class="login-label">Kullanıcı Adı</label>
      <input class="login-input" id="l-user" type="text" autocomplete="username" placeholder="maksure.com kullanıcı adın">
    </div>
    <div class="login-field">
      <label class="login-label">Şifre</label>
      <input class="login-input" id="l-pass" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">
      <span id="login-btn-text">Giriş Yap ✦</span>
    </button>
    <div class="login-note">Bilgilerin yalnızca bu cihazda saklanır.<br>Maksure.com üyelik bilgilerini gir.</div>
  </div>
</div>

<!-- HOME -->
<div id="screen-home" class="screen">
  <div class="topbar">
    <span class="topbar-title">مقصوره</span>
    <button class="topbar-btn" onclick="refreshLessons()" id="refresh-btn">↻</button>
  </div>
  <div class="home-scroll">
    <div class="resume-card" id="resume-card" onclick="resumeLesson()">
      <div class="resume-label">✦ Kaldığın Yer</div>
      <div class="resume-title" id="resume-title">—</div>
      <div class="resume-meta" id="resume-meta">—</div>
      <div class="prog-bar"><div class="prog-fill" id="resume-prog" style="width:0%"></div></div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="search" placeholder="Ders ara..." oninput="filterLessons(this.value)">
    </div>
    <div class="cat-row" id="cat-row"></div>
    <div class="sec-row">
      <span class="sec-title">Dersler</span>
      <span class="sec-count" id="lesson-count">—</span>
    </div>
    <div class="lesson-list" id="lesson-list">
      <div class="empty-state"><div class="empty-icon">📚</div><div class="empty-text">Yükleniyor...</div></div>
    </div>
  </div>
  <div class="bnav">
    <button class="bnav-item active" onclick="navTo('home')"><span class="icon">🏠</span>Dersler</button>
    <button class="bnav-item" onclick="navTo('add')"><span class="icon">➕</span>Ekle</button>
    <button class="bnav-item" onclick="navTo('settings')"><span class="icon">⚙️</span>Ayarlar</button>
  </div>
</div>

<!-- PLAYER -->
<div id="screen-player" class="screen">
  <div class="topbar">
    <button class="topbar-btn" onclick="goHome()">←</button>
    <span class="topbar-title" id="p-cat-top">Ders</span>
    <button class="topbar-btn" id="p-site-btn" onclick="openSite()" title="Sitede aç">↗</button>
  </div>
  <div class="player-scroll">
    <div class="p-header">
      <div class="p-cat" id="p-cat">—</div>
      <div class="p-title" id="p-title">—</div>
    </div>
    <div class="artwork" id="artwork">
      <div class="artwork-symbol">♪</div>
      <div class="artwork-dot"></div>
    </div>
    <div class="prog-wrap" onclick="seekAudio(event)">
      <div class="prog-track" id="prog-track">
        <div class="prog-track-fill" id="prog-fill" style="width:0%"></div>
      </div>
      <div class="times">
        <span id="t-cur">0:00</span>
        <span id="t-tot">0:00</span>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl" onclick="skipTime(-15)">⏪</button>
      <button class="ctrl" onclick="prevLesson()">⏮</button>
      <button class="ctrl-play" id="play-btn" onclick="togglePlay()">▶</button>
      <button class="ctrl" onclick="nextLesson()">⏭</button>
      <button class="ctrl" onclick="skipTime(15)">⏩</button>
    </div>
    <div class="extras">
      <button class="speed-btn" onclick="cycleSpeed()" id="speed-btn">1×</button>
      <div class="vol-wrap">
        <span>🔈</span>
        <input class="vol-slider" type="range" min="0" max="1" step="0.05" value="1" oninput="setVol(this.value)">
        <span>🔊</span>
      </div>
    </div>
    <button class="done-btn" id="done-btn" onclick="toggleDone()">✓ Tamamlandı Olarak İşaretle</button>
  </div>
</div>

<!-- ADD -->
<div id="screen-add" class="screen">
  <div class="topbar">
    <button class="topbar-btn" onclick="goHome()">←</button>
    <span class="topbar-title">Ders Ekle</span>
    <span></span>
  </div>
  <div class="add-scroll">
    <div class="field">
      <label class="field-lbl">Ders Adı *</label>
      <input class="field-inp" id="f-name" type="text" placeholder="örn: İrşâd 19. Ders">
    </div>
    <div class="field">
      <label class="field-lbl">Kategori</label>
      <input class="field-inp" id="f-cat" type="text" placeholder="örn: İrşâd, Tefsir, Fusûsü'l Hikem...">
    </div>
    <div class="field">
      <label class="field-lbl">Mp3 Linki</label>
      <input class="field-inp" id="f-url" type="url" placeholder="https://maksure.com/wp-content/DERSLER/...">
    </div>
    <div class="field">
      <label class="field-lbl">Not (isteğe bağlı)</label>
      <input class="field-inp" id="f-note" type="text" placeholder="Kısa not...">
    </div>
    <button class="save-btn" onclick="saveLesson()">Kaydet ✦</button>
    <div class="divider"></div>
    <div class="sec-title" style="margin-bottom:12px;">Veri Yönetimi</div>
    <button class="util-btn" onclick="exportData()">📤 Yedek Al (JSON)</button>
    <button class="util-btn" onclick="triggerImport()">📥 Yedek Yükle</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
  </div>
  <div class="bnav">
    <button class="bnav-item" onclick="navTo('home')"><span class="icon">🏠</span>Dersler</button>
    <button class="bnav-item active" onclick="navTo('add')"><span class="icon">➕</span>Ekle</button>
    <button class="bnav-item" onclick="navTo('settings')"><span class="icon">⚙️</span>Ayarlar</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="screen-settings" class="screen">
  <div class="topbar">
    <button class="topbar-btn" onclick="goHome()">←</button>
    <span class="topbar-title">Ayarlar</span>
    <span></span>
  </div>
  <div class="add-scroll">
    <div class="sec-title" style="margin-bottom:16px;">Hesap</div>
    <div style="background:var(--bg2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;">
      <div style="font-size:12px;color:var(--text3);margin-bottom:4px;">Giriş yapılan hesap</div>
      <div style="font-size:15px;color:var(--text);" id="settings-user">—</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">🚪 Çıkış Yap</button>
    <div class="divider"></div>
    <div class="sec-title" style="margin-bottom:12px;">İstatistikler</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;" id="stats-grid"></div>
  </div>
  <div class="bnav">
    <button class="bnav-item" onclick="navTo('home')"><span class="icon">🏠</span>Dersler</button>
    <button class="bnav-item" onclick="navTo('add')"><span class="icon">➕</span>Ekle</button>
    <button class="bnav-item active" onclick="navTo('settings')"><span class="icon">⚙️</span>Ayarlar</button>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="overlay-text" id="overlay-text">Yükleniyor...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- AUDIO -->
<audio id="audio" preload="none"></audio>

<script>
// ── STATE ──
let lessons = JSON.parse(localStorage.getItem('maks_lessons') || '[]');
let progress = JSON.parse(localStorage.getItem('maks_progress') || '{}');
let creds = JSON.parse(localStorage.getItem('maks_creds') || 'null');
let currentLesson = null;
let currentIdx = -1;
let speeds = [0.75,1,1.25,1.5,1.75,2];
let speedIdx = 1;
let searchQ = '';
let activeCat = 'all';
let saveTimer = null;
const audio = document.getElementById('audio');
const BASE = 'https://maksure.com';

function save() {
  localStorage.setItem('maks_lessons', JSON.stringify(lessons));
  localStorage.setItem('maks_progress', JSON.stringify(progress));
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function goHome() { navTo('home'); }

function navTo(id) {
  if (id === 'home') { showScreen('home'); renderHome(); setNavActive(0); return; }
  if (id === 'add') { showScreen('add'); setNavActive(1); return; }
  if (id === 'settings') {
    showScreen('settings');
    document.getElementById('settings-user').textContent = creds ? creds.username : '—';
    renderStats();
    setNavActive(2);
    return;
  }
}

function setNavActive(i) {
  document.querySelectorAll('.bnav-item').forEach((b,j) => b.classList.toggle('active', i===j));
}

// ── LOGIN ──
async function doLogin() {
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  if (!username || !password) { showLoginError('Kullanıcı adı ve şifre gerekli'); return; }

  const btn = document.getElementById('login-btn');
  document.getElementById('login-btn-text').textContent = 'Giriş yapılıyor...';
  btn.disabled = true;
  hideLoginError();

  try {
    // WordPress JWT or application password — try cookie-based login first
    const formData = new FormData();
    formData.append('log', username);
    formData.append('pwd', password);
    formData.append('wp-submit', 'Log In');
    formData.append('redirect_to', '/wp-admin/');
    formData.append('testcookie', '1');

    const res = await fetch(`${BASE}/wp-login.php`, {
      method: 'POST',
      body: formData,
      credentials: 'include',
      redirect: 'follow',
      mode: 'cors'
    });

    // Try fetching a protected page to verify login
    const testRes = await fetch(`${BASE}/wp-json/wp/v2/users/me`, {
      credentials: 'include',
      headers: { 'Authorization': 'Basic ' + btoa(username + ':' + password) }
    });

    if (testRes.ok) {
      const user = await testRes.json();
      creds = { username, password, displayName: user.name };
      localStorage.setItem('maks_creds', JSON.stringify(creds));
      showScreen('home');
      await fetchLessons();
    } else {
      // Try basic auth approach
      creds = { username, password };
      localStorage.setItem('maks_creds', JSON.stringify(creds));
      showScreen('home');
      renderHome();
      toast('Giriş yapıldı ✓ (Ders listesi manuel eklenebilir)');
    }
  } catch(e) {
    // CORS engellediyse — manual mod
    creds = { username, password };
    localStorage.setItem('maks_creds', JSON.stringify(creds));
    showScreen('home');
    renderHome();
    toast('⚠️ Otomatik bağlantı kısıtlı — dersler manuel eklenebilir');
  }

  btn.disabled = false;
  document.getElementById('login-btn-text').textContent = 'Giriş Yap ✦';
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
}
function hideLoginError() {
  document.getElementById('login-error').style.display = 'none';
}

function doLogout() {
  if (!confirm('Çıkış yapmak istediğinden emin misin?')) return;
  localStorage.removeItem('maks_creds');
  creds = null;
  showScreen('login');
}

// ── FETCH LESSONS FROM SITE ──
async function fetchLessons() {
  if (!creds) return;
  showOverlay('Dersler yükleniyor...');
  try {
    const headers = {
      'Authorization': 'Basic ' + btoa(creds.username + ':' + creds.password)
    };
    // Get all pages (wp/v2/pages) — dersler sayfa olarak tutuluyorsa
    const res = await fetch(`${BASE}/wp-json/wp/v2/pages?per_page=100&parent=2189`, { headers, credentials:'include' });
    if (res.ok) {
      const pages = await res.json();
      if (pages.length > 0) {
        // Merge with existing — don't duplicate
        const existing = new Set(lessons.map(l => l.pageId));
        let added = 0;
        for (const p of pages) {
          if (!existing.has(String(p.id))) {
            // Try to extract mp3 from content
            const mp3 = extractMp3(p.content.rendered);
            lessons.push({
              id: 'p' + p.id,
              pageId: String(p.id),
              name: decodeHTML(p.title.rendered),
              category: p.parent ? '' : '',
              url: mp3 || p.link,
              pageUrl: p.link,
              addedAt: p.date
            });
            added++;
          }
        }
        save();
        hideOverlay();
        renderHome();
        toast(added > 0 ? `✓ ${added} ders yüklendi!` : 'Dersler güncel ✓');
        return;
      }
    }

    // Try posts
    const res2 = await fetch(`${BASE}/wp-json/wp/v2/posts?per_page=100&categories=0`, { headers, credentials:'include' });
    if (res2.ok) {
      const posts = await res2.json();
      if (posts.length > 0) {
        let added = 0;
        const existing = new Set(lessons.map(l => l.pageId));
        for (const p of posts) {
          if (!existing.has('post-' + p.id)) {
            const mp3 = extractMp3(p.content.rendered);
            lessons.push({
              id: 'post' + p.id,
              pageId: 'post-' + p.id,
              name: decodeHTML(p.title.rendered),
              category: '',
              url: mp3 || p.link,
              pageUrl: p.link,
              addedAt: p.date
            });
            added++;
          }
        }
        save();
        hideOverlay();
        renderHome();
        toast(added > 0 ? `✓ ${added} ders yüklendi!` : 'Dersler güncel ✓');
        return;
      }
    }

    hideOverlay();
    renderHome();
    toast('API yanıt verdi ama ders bulunamadı — manuel ekle');
  } catch(e) {
    hideOverlay();
    renderHome();
    toast('⚠️ Bağlantı hatası — dersler manuel eklenebilir');
  }
}

async function refreshLessons() {
  document.getElementById('refresh-btn').style.animation = 'spin 0.8s linear infinite';
  await fetchLessons();
  document.getElementById('refresh-btn').style.animation = '';
}

function extractMp3(html) {
  const m = html.match(/https?:\/\/[^"'\s]+\.mp3/i);
  return m ? m[0] : null;
}
function decodeHTML(html) {
  const t = document.createElement('textarea');
  t.innerHTML = html;
  return t.value;
}

// ── HOME RENDER ──
function renderHome() {
  renderResumeCard();
  renderCategories();
  renderLessonList();
}

function renderResumeCard() {
  const card = document.getElementById('resume-card');
  const entry = Object.entries(progress).find(([id,v]) => !v.done && v.time > 5);
  if (!entry) { card.style.display = 'none'; return; }
  const lesson = lessons.find(l => l.id === entry[0]);
  if (!lesson) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  document.getElementById('resume-title').textContent = lesson.name;
  document.getElementById('resume-meta').textContent =
    (lesson.category || '') + (lesson.category ? ' • ' : '') + fmt(entry[1].time) + ' kaldın';
  const pct = entry[1].duration ? Math.round((entry[1].time/entry[1].duration)*100) : 0;
  document.getElementById('resume-prog').style.width = pct + '%';
}

function renderCategories() {
  const cats = ['all', ...new Set(lessons.filter(l=>l.category).map(l=>l.category))];
  document.getElementById('cat-row').innerHTML = cats.map(c =>
    `<button class="cat-btn ${activeCat===c?'active':''}" onclick="setCat('${c}')">${c==='all'?'✦ Tümü':c}</button>`
  ).join('');
}

function setCat(c) { activeCat = c; renderHome(); }

function filterLessons(q) { searchQ = q.toLowerCase(); renderLessonList(); }

function getFiltered() {
  return lessons.filter(l => {
    const mc = activeCat === 'all' || l.category === activeCat;
    const ms = !searchQ || l.name.toLowerCase().includes(searchQ) || (l.category||'').toLowerCase().includes(searchQ);
    return mc && ms;
  });
}

function renderLessonList() {
  const list = document.getElementById('lesson-list');
  const filtered = getFiltered();
  document.getElementById('lesson-count').textContent = filtered.length + ' ders';
  if (!filtered.length) {
    list.innerHTML = lessons.length
      ? `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Sonuç bulunamadı</div></div>`
      : `<div class="empty-state"><div class="empty-icon">📚</div><div class="empty-text">Henüz ders eklenmemiş.<br><strong>Ekle</strong> sekmesinden ekleyebilirsin.</div></div>`;
    return;
  }
  list.innerHTML = filtered.map((l,i) => {
    const p = progress[l.id] || {};
    const done = p.done, playing = currentLesson?.id === l.id;
    const pct = p.duration && p.time ? Math.round((p.time/p.duration)*100) : 0;
    return `<div class="lesson-item ${done?'done':''} ${playing?'playing':''}" onclick="playLesson('${l.id}')">
      <div class="l-num">${done?'✓':playing?'♪':(i+1)}</div>
      <div class="l-info">
        <div class="l-name">${l.name}</div>
        <div class="l-meta">${l.category||''}${pct>0&&!done?' • %'+pct+' tamamlandı':''}${l.note?' • '+l.note:''}</div>
      </div>
      <span class="l-tag ${done?'done-tag':''}">${done?'Bitti ✓':pct>0?pct+'%':'Yeni'}</span>
    </div>`;
  }).join('');
}

// ── PLAYER ──
function playLesson(id) {
  const lesson = lessons.find(l => l.id === id);
  if (!lesson) return;
  currentLesson = lesson;
  currentIdx = lessons.indexOf(lesson);
  showScreen('player');

  document.getElementById('p-title').textContent = lesson.name;
  document.getElementById('p-cat').textContent = lesson.category || 'Ders';
  document.getElementById('p-cat-top').textContent = lesson.category || 'Ders';
  updateDoneBtn();

  const p = progress[lesson.id] || {};

  if (lesson.url && lesson.url.match(/\.mp3(\?|$)/i)) {
    audio.src = lesson.url;
    audio.load();
    audio.currentTime = p.time || 0;
    audio.play().then(() => {
      document.getElementById('artwork').classList.add('spinning');
      document.getElementById('play-btn').textContent = '⏸';
    }).catch(() => toast('⚠️ Mp3 yüklenemedi — siteye git'));
  } else {
    document.getElementById('play-btn').textContent = '▶';
    if (lesson.url) toast('Mp3 linki yok — ↗ ile siteyi aç');
  }
}

function resumeLesson() {
  const entry = Object.entries(progress).find(([id,v]) => !v.done && v.time > 5);
  if (!entry) return;
  playLesson(entry[0]);
}

function togglePlay() {
  if (!currentLesson) return;
  if (!audio.src || audio.src === window.location.href) { toast('Mp3 linki yok'); return; }
  if (audio.paused) {
    audio.play();
    document.getElementById('artwork').classList.add('spinning');
    document.getElementById('play-btn').textContent = '⏸';
  } else {
    audio.pause();
    document.getElementById('artwork').classList.remove('spinning');
    document.getElementById('play-btn').textContent = '▶';
  }
}

function skipTime(s) {
  if (audio.src) audio.currentTime = Math.max(0, Math.min(audio.duration||0, audio.currentTime+s));
}

function nextLesson() {
  if (currentIdx < lessons.length-1) playLesson(lessons[currentIdx+1].id);
  else toast('Son ders! 🎉');
}
function prevLesson() {
  if (currentIdx > 0) playLesson(lessons[currentIdx-1].id);
}

function cycleSpeed() {
  speedIdx = (speedIdx+1) % speeds.length;
  audio.playbackRate = speeds[speedIdx];
  document.getElementById('speed-btn').textContent = speeds[speedIdx] + '×';
}
function setVol(v) { audio.volume = v; }

function seekAudio(e) {
  if (!audio.duration) return;
  const tr = document.getElementById('prog-track');
  const pct = (e.clientX - tr.getBoundingClientRect().left) / tr.offsetWidth;
  audio.currentTime = pct * audio.duration;
}

function updateDoneBtn() {
  const btn = document.getElementById('done-btn');
  const done = (progress[currentLesson?.id] || {}).done;
  btn.textContent = done ? '↩ Tamamlandı İşaretini Kaldır' : '✓ Tamamlandı Olarak İşaretle';
  btn.classList.toggle('undone', !!done);
}

function toggleDone() {
  if (!currentLesson) return;
  if (!progress[currentLesson.id]) progress[currentLesson.id] = {};
  progress[currentLesson.id].done = !progress[currentLesson.id].done;
  save(); updateDoneBtn();
  toast(progress[currentLesson.id].done ? '✓ Tamamlandı!' : 'İşaret kaldırıldı');
}

function openSite() {
  const url = currentLesson?.pageUrl || currentLesson?.url || BASE;
  window.open(url, '_blank');
}

// ── AUDIO EVENTS ──
audio.addEventListener('timeupdate', () => {
  if (!currentLesson || !audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('t-cur').textContent = fmt(audio.currentTime);
  document.getElementById('t-tot').textContent = fmt(audio.duration);
  if (!saveTimer) saveTimer = setTimeout(() => {
    if (currentLesson) {
      if (!progress[currentLesson.id]) progress[currentLesson.id] = {};
      progress[currentLesson.id].time = Math.floor(audio.currentTime);
      progress[currentLesson.id].duration = Math.floor(audio.duration);
      save();
    }
    saveTimer = null;
  }, 5000);
});

audio.addEventListener('ended', () => {
  document.getElementById('artwork').classList.remove('spinning');
  document.getElementById('play-btn').textContent = '▶';
  if (currentLesson) {
    if (!progress[currentLesson.id]) progress[currentLesson.id] = {};
    progress[currentLesson.id].done = true;
    progress[currentLesson.id].time = 0;
    save(); updateDoneBtn();
    toast('🎉 Ders tamamlandı!');
  }
});

audio.addEventListener('pause', () => {
  document.getElementById('artwork').classList.remove('spinning');
  document.getElementById('play-btn').textContent = '▶';
  if (currentLesson) {
    if (!progress[currentLesson.id]) progress[currentLesson.id] = {};
    progress[currentLesson.id].time = Math.floor(audio.currentTime);
    progress[currentLesson.id].duration = Math.floor(audio.duration);
    save();
  }
});

// ── ADD LESSON ──
function saveLesson() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Ders adı zorunlu!'); return; }
  lessons.push({
    id: 'l'+Date.now(),
    name,
    category: document.getElementById('f-cat').value.trim(),
    url: document.getElementById('f-url').value.trim(),
    note: document.getElementById('f-note').value.trim(),
    addedAt: new Date().toISOString()
  });
  save();
  ['f-name','f-cat','f-url','f-note'].forEach(id => document.getElementById(id).value='');
  toast('✓ Ders kaydedildi!');
  goHome();
}

// ── STATS ──
function renderStats() {
  const total = lessons.length;
  const done = Object.values(progress).filter(p=>p.done).length;
  const inProgress = Object.values(progress).filter(p=>!p.done&&p.time>5).length;
  const cats = new Set(lessons.filter(l=>l.category).map(l=>l.category)).size;
  document.getElementById('stats-grid').innerHTML = [
    ['📚','Toplam Ders',total],
    ['✓','Tamamlanan',done],
    ['▶','Devam Eden',inProgress],
    ['📂','Kategori',cats]
  ].map(([icon,label,val])=>`
    <div style="background:var(--bg2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--r);padding:14px;text-align:center;">
      <div style="font-size:24px;margin-bottom:6px;">${icon}</div>
      <div style="font-size:22px;font-weight:700;color:var(--gold);">${val}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px;">${label}</div>
    </div>`).join('');
}

// ── EXPORT / IMPORT ──
function exportData() {
  const blob = new Blob([JSON.stringify({lessons,progress},null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'maksure-yedek-'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
  toast('📤 Yedek indirildi!');
}
function triggerImport() { document.getElementById('import-file').click(); }
function importData(input) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (d.lessons) lessons = d.lessons;
      if (d.progress) progress = d.progress;
      save(); toast('✓ Yedek yüklendi!'); goHome();
    } catch { toast('Hata: Geçersiz dosya'); }
  };
  r.readAsText(input.files[0]);
}

// ── OVERLAY ──
function showOverlay(msg) {
  document.getElementById('overlay-text').textContent = msg;
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay() { document.getElementById('overlay').classList.remove('show'); }

// ── TOAST ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2800);
}

// ── UTILS ──
function fmt(s) {
  if (!s||isNaN(s)) return '0:00';
  return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
}

// ── INIT ──
if (creds) {
  showScreen('home');
  renderHome();
  // Try to refresh lessons in background
  setTimeout(fetchLessons, 500);
} else {
  showScreen('login');
}
</script>
</body>
</html>
