<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Maksure Dersler">
<meta name="theme-color" content="#1a1410">
<title>Maksure Dersler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0d0a;
    --bg2: #1a1710;
    --bg3: #242018;
    --gold: #c9a84c;
    --gold2: #e8c96a;
    --gold-dim: #7a6330;
    --text: #f0e8d5;
    --text2: #a89878;
    --text3: #6b5f47;
    --accent: #8b4513;
    --green: #4a7c59;
    --red: #8b3a3a;
    --radius: 12px;
    --shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; min-height: 100vh; min-height: -webkit-fill-available; }
  .screen.active { display: flex; }

  /* ── SPLASH ── */
  #screen-splash {
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, #2a2010 0%, #0f0d0a 70%);
    gap: 24px;
  }
  .splash-logo {
    font-family: 'Amiri', serif;
    font-size: 52px;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(201,168,76,0.4);
    letter-spacing: 2px;
  }
  .splash-sub {
    font-size: 14px;
    color: var(--text2);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .splash-ornament {
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .splash-btn {
    margin-top: 16px;
    padding: 14px 40px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #1a1410;
    border: none;
    border-radius: 40px;
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
    transition: all 0.2s;
  }
  .splash-btn:active { transform: scale(0.97); }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--bg2);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-title {
    font-family: 'Amiri', serif;
    font-size: 22px;
    color: var(--gold);
  }
  .topbar-btn {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 22px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    transition: color 0.2s;
  }
  .topbar-btn:active { color: var(--gold); }

  /* ── BROWSER SCREEN ── */
  #screen-browser { position: relative; }
  #browser-frame {
    flex: 1;
    width: 100%;
    border: none;
    background: #fff;
  }
  .browser-bar {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    background: var(--bg2);
    border-bottom: 1px solid rgba(201,168,76,0.1);
    gap: 10px;
  }
  .browser-url {
    flex: 1;
    background: var(--bg3);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text2);
    font-size: 13px;
    font-family: 'Tajawal', sans-serif;
    outline: none;
  }
  .browser-url:focus { border-color: var(--gold); color: var(--text); }
  .browser-go {
    background: var(--gold);
    color: #1a1410;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-weight: 700;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }

  /* ── HOME SCREEN ── */
  #screen-home { flex-direction: column; }
  .home-content { flex: 1; overflow-y: auto; padding: 16px; }

  /* Resume card */
  .resume-card {
    background: linear-gradient(135deg, #2a1f0e, #1a1710);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .resume-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold));
  }
  .resume-card:active { transform: scale(0.99); }
  .resume-card-label {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .resume-card-title {
    font-family: 'Amiri', serif;
    font-size: 18px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .resume-card-sub {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 12px;
  }
  .resume-progress-bar {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }
  .resume-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 2px;
    transition: width 0.5s;
  }

  /* Section header */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    margin-top: 8px;
  }
  .section-title {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .section-count {
    font-size: 12px;
    color: var(--text3);
  }

  /* Lesson list */
  .lesson-list { display: flex; flex-direction: column; gap: 8px; }
  .lesson-item {
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .lesson-item:active { background: var(--bg3); transform: scale(0.99); }
  .lesson-item.playing {
    border-color: rgba(201,168,76,0.4);
    background: linear-gradient(135deg, #201a0e, #1a1710);
  }
  .lesson-item.done { opacity: 0.6; }
  .lesson-num {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--text3);
    font-weight: 500;
    flex-shrink: 0;
  }
  .lesson-item.playing .lesson-num {
    background: var(--gold);
    color: #1a1410;
  }
  .lesson-item.done .lesson-num {
    background: rgba(74,124,89,0.2);
    color: var(--green);
  }
  .lesson-info { flex: 1; min-width: 0; }
  .lesson-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lesson-meta {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }
  .lesson-item.playing .lesson-name { color: var(--gold2); }
  .lesson-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(201,168,76,0.1);
    color: var(--gold-dim);
    white-space: nowrap;
  }
  .lesson-tag.done-tag {
    background: rgba(74,124,89,0.15);
    color: var(--green);
  }

  /* ── PLAYER SCREEN ── */
  #screen-player { flex-direction: column; }
  .player-content { flex: 1; overflow-y: auto; padding: 20px 16px; }

  .player-header {
    text-align: center;
    margin-bottom: 32px;
    padding: 0 8px;
  }
  .player-category {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .player-title {
    font-family: 'Amiri', serif;
    font-size: 24px;
    color: var(--text);
    line-height: 1.4;
  }

  /* Artwork */
  .player-artwork {
    width: 200px;
    height: 200px;
    margin: 0 auto 32px;
    border-radius: 50%;
    background: radial-gradient(circle, #2a2010, #1a1410);
    border: 2px solid rgba(201,168,76,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 60px rgba(201,168,76,0.08);
  }
  .player-artwork.spinning {
    animation: spin 8s linear infinite;
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .artwork-inner {
    font-family: 'Amiri', serif;
    font-size: 64px;
    color: var(--gold);
    opacity: 0.6;
  }
  .artwork-dot {
    position: absolute;
    width: 20px;
    height: 20px;
    background: var(--bg);
    border: 2px solid rgba(201,168,76,0.4);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
  }

  /* Progress */
  .player-progress-wrap {
    margin-bottom: 8px;
    cursor: pointer;
    padding: 8px 0;
  }
  .player-progress-track {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .player-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 2px;
    transition: width 0.5s linear;
    pointer-events: none;
  }
  .player-times {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text3);
    margin-top: 6px;
  }

  /* Controls */
  .player-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin: 24px 0 20px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 28px;
    cursor: pointer;
    padding: 8px;
    transition: all 0.15s;
    border-radius: 50%;
  }
  .ctrl-btn:active { color: var(--gold); transform: scale(0.9); }
  .ctrl-play {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none;
    border-radius: 50%;
    color: #1a1410;
    font-size: 26px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(201,168,76,0.35);
    transition: all 0.15s;
  }
  .ctrl-play:active { transform: scale(0.94); box-shadow: 0 2px 10px rgba(201,168,76,0.2); }

  /* Speed & volume */
  .player-extras {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8px;
    margin-bottom: 24px;
  }
  .speed-btn {
    background: var(--bg3);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--gold);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
  }
  .volume-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text3);
    font-size: 16px;
  }
  .volume-slider {
    -webkit-appearance: none;
    width: 80px;
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    outline: none;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
  }

  /* Mark done */
  .mark-done-btn {
    width: 100%;
    padding: 14px;
    background: rgba(74,124,89,0.15);
    border: 1px solid rgba(74,124,89,0.3);
    color: var(--green);
    border-radius: var(--radius);
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
  }
  .mark-done-btn:active { background: rgba(74,124,89,0.25); }
  .mark-done-btn.undone {
    background: rgba(139,58,58,0.1);
    border-color: rgba(139,58,58,0.3);
    color: var(--red);
  }

  /* ── ADD LESSON SCREEN ── */
  #screen-add { flex-direction: column; }
  .add-content { flex: 1; padding: 24px 16px; overflow-y: auto; }

  .field-group { margin-bottom: 20px; }
  .field-label {
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }
  .field-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: var(--radius);
    padding: 14px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Tajawal', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--gold); }
  .field-input::placeholder { color: var(--text3); }

  .save-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #1a1410;
    border: none;
    border-radius: var(--radius);
    font-family: 'Tajawal', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .save-btn:active { transform: scale(0.98); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    display: flex;
    background: var(--bg2);
    border-top: 1px solid rgba(201,168,76,0.1);
    padding: 8px 0;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 0;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text3);
    font-size: 10px;
    letter-spacing: 0.5px;
    border: none;
    background: none;
    font-family: 'Tajawal', sans-serif;
  }
  .nav-item .nav-icon { font-size: 22px; transition: all 0.15s; }
  .nav-item.active { color: var(--gold); }
  .nav-item.active .nav-icon { transform: translateY(-2px); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-text { font-size: 15px; line-height: 1.6; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 40px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  /* Category filter */
  .category-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 0 12px;
    scrollbar-width: none;
  }
  .category-scroll::-webkit-scrollbar { display: none; }
  .cat-btn {
    white-space: nowrap;
    padding: 6px 14px;
    border-radius: 20px;
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text2);
    font-size: 13px;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .cat-btn.active {
    background: rgba(201,168,76,0.15);
    border-color: rgba(201,168,76,0.4);
    color: var(--gold);
  }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 11px 16px 11px 40px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Tajawal', sans-serif;
    outline: none;
  }
  .search-input:focus { border-color: rgba(201,168,76,0.3); }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 16px;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="screen-splash" class="screen active">
  <div class="splash-logo">مقصوره</div>
  <div class="splash-sub">Ders Takip</div>
  <div class="splash-ornament"></div>
  <button class="splash-btn" onclick="goHome()">Başla ✦</button>
</div>

<!-- HOME -->
<div id="screen-home" class="screen">
  <div class="topbar">
    <span class="topbar-title">مقصوره</span>
    <button class="topbar-btn" onclick="showAdd()">＋</button>
  </div>
  <div class="home-content">
    <!-- Resume card (shown when there's a current lesson) -->
    <div id="resume-card" class="resume-card" onclick="resumeLesson()" style="display:none">
      <div class="resume-card-label">✦ Kaldığın Yer</div>
      <div class="resume-card-title" id="resume-title">—</div>
      <div class="resume-card-sub" id="resume-sub">—</div>
      <div class="resume-progress-bar">
        <div class="resume-progress-fill" id="resume-progress" style="width:0%"></div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="search" placeholder="Ders ara..." oninput="filterLessons(this.value)">
    </div>

    <!-- Category filter -->
    <div class="category-scroll" id="cat-filter"></div>

    <!-- Lesson list -->
    <div class="section-header">
      <span class="section-title">Dersler</span>
      <span class="section-count" id="lesson-count">0 ders</span>
    </div>
    <div class="lesson-list" id="lesson-list">
      <div class="empty-state">
        <div class="empty-icon">📚</div>
        <div class="empty-text">Henüz ders eklenmemiş.<br>Sağ üstteki <strong>＋</strong> ile ekleyebilirsin.</div>
      </div>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="nav-item active" onclick="navTo('home')">
      <span class="nav-icon">🏠</span>Dersler
    </button>
    <button class="nav-item" onclick="navTo('browser')">
      <span class="nav-icon">🌐</span>Site
    </button>
    <button class="nav-item" onclick="navTo('add')">
      <span class="nav-icon">➕</span>Ekle
    </button>
  </div>
</div>

<!-- PLAYER -->
<div id="screen-player" class="screen">
  <div class="topbar">
    <button class="topbar-btn" onclick="goHome()">←</button>
    <span class="topbar-title" id="player-category-top">Ders</span>
    <button class="topbar-btn" onclick="openInBrowser()" title="Sitede aç">↗</button>
  </div>
  <div class="player-content">
    <div class="player-header">
      <div class="player-category" id="player-category">—</div>
      <div class="player-title" id="player-title">—</div>
    </div>

    <div class="player-artwork" id="player-artwork">
      <div class="artwork-inner">♪</div>
      <div class="artwork-dot"></div>
    </div>

    <!-- Progress -->
    <div class="player-progress-wrap" onclick="seekAudio(event)">
      <div class="player-progress-track" id="progress-track">
        <div class="player-progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="player-times">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="player-controls">
      <button class="ctrl-btn" onclick="skipTime(-15)" title="-15 sn">⏪</button>
      <button class="ctrl-btn" onclick="prevLesson()" title="Önceki">⏮</button>
      <button class="ctrl-play" id="play-btn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="nextLesson()" title="Sonraki">⏭</button>
      <button class="ctrl-btn" onclick="skipTime(15)" title="+15 sn">⏩</button>
    </div>

    <!-- Speed & Volume -->
    <div class="player-extras">
      <button class="speed-btn" onclick="cycleSpeed()" id="speed-btn">1×</button>
      <div class="volume-wrap">
        <span>🔈</span>
        <input class="volume-slider" type="range" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
        <span>🔊</span>
      </div>
    </div>

    <!-- Mark done -->
    <button class="mark-done-btn" id="mark-done-btn" onclick="toggleDone()">
      ✓ Dersi Tamamlandı Olarak İşaretle
    </button>
  </div>
</div>

<!-- BROWSER -->
<div id="screen-browser" class="screen">
  <div class="browser-bar">
    <input class="browser-url" id="browser-url-input" type="url" value="https://maksure.com" placeholder="https://maksure.com">
    <button class="browser-go" onclick="loadBrowserUrl()">Git</button>
    <button class="topbar-btn" onclick="navTo('home')">✕</button>
  </div>
  <iframe id="browser-frame" src="about:blank" allowfullscreen></iframe>
</div>

<!-- ADD LESSON -->
<div id="screen-add" class="screen">
  <div class="topbar">
    <button class="topbar-btn" onclick="goHome()">←</button>
    <span class="topbar-title">Ders Ekle</span>
    <span></span>
  </div>
  <div class="add-content">
    <div class="field-group">
      <label class="field-label">Ders Adı *</label>
      <input class="field-input" id="f-name" type="text" placeholder="örn: Fusûsü'l Hikem 160. Ders">
    </div>
    <div class="field-group">
      <label class="field-label">Kategori</label>
      <input class="field-input" id="f-cat" type="text" placeholder="örn: Fusûsü'l Hikem, Tefsir...">
    </div>
    <div class="field-group">
      <label class="field-label">Mp3 / Sayfa Linki</label>
      <input class="field-input" id="f-url" type="url" placeholder="https://maksure.com/?page_id=...">
    </div>
    <div class="field-group">
      <label class="field-label">Notlar (isteğe bağlı)</label>
      <input class="field-input" id="f-note" type="text" placeholder="Kısa not ekle...">
    </div>
    <button class="save-btn" onclick="saveLesson()">Kaydet ✦</button>

    <div style="margin-top: 32px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06);">
      <div class="section-title" style="margin-bottom: 12px;">Dersleri Yönet</div>
      <button onclick="exportData()" style="width:100%;padding:12px;background:var(--bg2);border:1px solid rgba(255,255,255,0.1);color:var(--text2);border-radius:var(--radius);font-family:'Tajawal',sans-serif;font-size:14px;cursor:pointer;margin-bottom:8px;">
        📤 Verileri Dışa Aktar (JSON)
      </button>
      <button onclick="triggerImport()" style="width:100%;padding:12px;background:var(--bg2);border:1px solid rgba(255,255,255,0.1);color:var(--text2);border-radius:var(--radius);font-family:'Tajawal',sans-serif;font-size:14px;cursor:pointer;">
        📥 Verileri İçe Aktar
      </button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden audio -->
<audio id="audio-player" preload="none"></audio>

<script>
// ── STATE ──
let lessons = JSON.parse(localStorage.getItem('maks_lessons') || '[]');
let progress = JSON.parse(localStorage.getItem('maks_progress') || '{}');
// { lessonId: { time: seconds, done: bool } }
let currentLesson = null;
let currentIndex = -1;
let speeds = [0.75, 1, 1.25, 1.5, 1.75, 2];
let speedIdx = 1;
let searchQuery = '';
let activeCategory = 'all';
let audio = document.getElementById('audio-player');
let saveTimer = null;
let browserLoaded = false;

// ── SAVE ──
function save() {
  localStorage.setItem('maks_lessons', JSON.stringify(lessons));
  localStorage.setItem('maks_progress', JSON.stringify(progress));
}

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function goHome() {
  showScreen('home');
  renderHome();
  updateNavActive('home');
}

function showAdd() {
  showScreen('add');
  updateNavActive('add');
}

function navTo(id) {
  if (id === 'home') { goHome(); return; }
  if (id === 'browser') {
    showScreen('browser');
    if (!browserLoaded) {
      document.getElementById('browser-frame').src = 'https://maksure.com';
      browserLoaded = true;
    }
    updateNavActive('browser');
    return;
  }
  if (id === 'add') { showAdd(); return; }
}

function updateNavActive(id) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const map = { home: 0, browser: 1, add: 2 };
  const idx = map[id];
  if (idx !== undefined) document.querySelectorAll('.nav-item')[idx].classList.add('active');
}

// ── HOME RENDER ──
function renderHome() {
  renderResumeCard();
  renderCategories();
  renderLessons();
}

function renderResumeCard() {
  const card = document.getElementById('resume-card');
  const p = Object.entries(progress).find(([id, v]) => !v.done && v.time > 0);
  if (!p) { card.style.display = 'none'; return; }
  const [id, data] = p;
  const lesson = lessons.find(l => l.id === id);
  if (!lesson) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  document.getElementById('resume-title').textContent = lesson.name;
  document.getElementById('resume-sub').textContent = lesson.category ? lesson.category + ' • ' : '';
  document.getElementById('resume-sub').textContent += formatTime(data.time) + ' kaldın';
  const pct = data.duration ? Math.round((data.time / data.duration) * 100) : 0;
  document.getElementById('resume-progress').style.width = pct + '%';
  card.onclick = () => playLesson(lesson);
}

function renderCategories() {
  const cats = ['all', ...new Set(lessons.filter(l => l.category).map(l => l.category))];
  const wrap = document.getElementById('cat-filter');
  wrap.innerHTML = cats.map(c => `
    <button class="cat-btn ${activeCategory === c ? 'active' : ''}" onclick="setCat('${c}')">
      ${c === 'all' ? '✦ Tümü' : c}
    </button>`).join('');
}

function setCat(c) {
  activeCategory = c;
  renderCategories();
  renderLessons();
}

function filterLessons(q) {
  searchQuery = q.toLowerCase();
  renderLessons();
}

function getFilteredLessons() {
  return lessons.filter(l => {
    const matchCat = activeCategory === 'all' || l.category === activeCategory;
    const matchSearch = !searchQuery || l.name.toLowerCase().includes(searchQuery) ||
      (l.category || '').toLowerCase().includes(searchQuery);
    return matchCat && matchSearch;
  });
}

function renderLessons() {
  const list = document.getElementById('lesson-list');
  const filtered = getFilteredLessons();
  document.getElementById('lesson-count').textContent = filtered.length + ' ders';

  if (filtered.length === 0) {
    if (lessons.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">📚</div><div class="empty-text">Henüz ders eklenmemiş.<br>Sağ üstteki <strong>＋</strong> ile ekleyebilirsin.</div></div>`;
    } else {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Arama sonucu bulunamadı.</div></div>`;
    }
    return;
  }

  list.innerHTML = filtered.map((l, i) => {
    const p = progress[l.id] || {};
    const isDone = p.done;
    const isPlaying = currentLesson && currentLesson.id === l.id;
    const pct = p.duration && p.time ? Math.round((p.time / p.duration) * 100) : 0;
    return `
      <div class="lesson-item ${isDone ? 'done' : ''} ${isPlaying ? 'playing' : ''}" onclick="playLesson(lessons.find(x=>x.id==='${l.id}'))">
        <div class="lesson-num">${isDone ? '✓' : isPlaying ? '♪' : (i + 1)}</div>
        <div class="lesson-info">
          <div class="lesson-name">${l.name}</div>
          <div class="lesson-meta">${l.category || ''}${pct > 0 && !isDone ? ' • %' + pct + ' tamamlandı' : ''}${l.note ? ' • ' + l.note : ''}</div>
        </div>
        <span class="lesson-tag ${isDone ? 'done-tag' : ''}">${isDone ? 'Bitti ✓' : pct > 0 ? pct + '%' : 'Yeni'}</span>
      </div>`;
  }).join('');
}

// ── PLAYER ──
function playLesson(lesson) {
  if (!lesson) return;
  currentLesson = lesson;
  currentIndex = lessons.indexOf(lesson);
  showScreen('player');

  document.getElementById('player-title').textContent = lesson.name;
  document.getElementById('player-category').textContent = lesson.category || 'Ders';
  document.getElementById('player-category-top').textContent = lesson.category || 'Ders';

  const p = progress[lesson.id] || {};
  updateDoneButton();

  // Try to load mp3 directly or open the page
  if (lesson.url) {
    const url = lesson.url;
    if (url.match(/\.(mp3|ogg|wav|m4a|aac)(\?|$)/i)) {
      // Direct mp3
      audio.src = url;
      audio.load();
      audio.currentTime = p.time || 0;
      audio.play();
      document.getElementById('player-artwork').classList.add('spinning');
      document.getElementById('play-btn').textContent = '⏸';
    } else {
      // Page URL - open in browser iframe
      toast('Sayfa açılıyor... Mp3 linki varsa buraya yapıştır');
    }
  }
}

function resumeLesson() {
  const p = Object.entries(progress).find(([id, v]) => !v.done && v.time > 0);
  if (!p) return;
  const lesson = lessons.find(l => l.id === p[0]);
  if (lesson) playLesson(lesson);
}

function togglePlay() {
  if (!currentLesson) return;
  if (audio.src && audio.src !== window.location.href) {
    if (audio.paused) {
      audio.play();
      document.getElementById('player-artwork').classList.add('spinning');
      document.getElementById('play-btn').textContent = '⏸';
    } else {
      audio.pause();
      document.getElementById('player-artwork').classList.remove('spinning');
      document.getElementById('play-btn').textContent = '▶';
    }
  } else {
    toast('Mp3 linki ekleyin — Düzenle ile güncelleyebilirsiniz');
  }
}

function skipTime(sec) {
  if (!audio.src) return;
  audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

function nextLesson() {
  if (currentIndex < lessons.length - 1) {
    playLesson(lessons[currentIndex + 1]);
  } else {
    toast('Son ders bu! 🎉');
  }
}

function prevLesson() {
  if (currentIndex > 0) playLesson(lessons[currentIndex - 1]);
}

function cycleSpeed() {
  speedIdx = (speedIdx + 1) % speeds.length;
  audio.playbackRate = speeds[speedIdx];
  document.getElementById('speed-btn').textContent = speeds[speedIdx] + '×';
}

function setVolume(v) {
  audio.volume = v;
}

function seekAudio(e) {
  if (!audio.duration) return;
  const track = document.getElementById('progress-track');
  const rect = track.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

function updateDoneButton() {
  const btn = document.getElementById('mark-done-btn');
  const done = (progress[currentLesson.id] || {}).done;
  if (done) {
    btn.textContent = '↩ Tamamlandı İşaretini Kaldır';
    btn.classList.add('undone');
  } else {
    btn.textContent = '✓ Dersi Tamamlandı Olarak İşaretle';
    btn.classList.remove('undone');
  }
}

function toggleDone() {
  if (!currentLesson) return;
  if (!progress[currentLesson.id]) progress[currentLesson.id] = {};
  progress[currentLesson.id].done = !progress[currentLesson.id].done;
  save();
  updateDoneButton();
  toast(progress[currentLesson.id].done ? '✓ Tamamlandı olarak işaretlendi!' : 'İşaret kaldırıldı');
}

function openInBrowser() {
  if (currentLesson && currentLesson.url) {
    document.getElementById('browser-url-input').value = currentLesson.url;
    document.getElementById('browser-frame').src = currentLesson.url;
    browserLoaded = true;
    showScreen('browser');
  } else {
    navTo('browser');
  }
}

// ── AUDIO EVENTS ──
audio.addEventListener('timeupdate', () => {
  if (!currentLesson || !audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-current').textContent = formatTime(audio.currentTime);
  document.getElementById('time-total').textContent = formatTime(audio.duration);

  // Autosave every 5 seconds
  if (!saveTimer) {
    saveTimer = setTimeout(() => {
      if (!progress[currentLesson.id]) progress[currentLesson.id] = {};
      progress[currentLesson.id].time = Math.floor(audio.currentTime);
      progress[currentLesson.id].duration = Math.floor(audio.duration);
      save();
      saveTimer = null;
    }, 5000);
  }
});

audio.addEventListener('ended', () => {
  document.getElementById('player-artwork').classList.remove('spinning');
  document.getElementById('play-btn').textContent = '▶';
  if (!progress[currentLesson.id]) progress[currentLesson.id] = {};
  progress[currentLesson.id].done = true;
  progress[currentLesson.id].time = 0;
  save();
  updateDoneButton();
  toast('🎉 Ders bitti! Otomatik tamamlandı.');
});

audio.addEventListener('pause', () => {
  document.getElementById('player-artwork').classList.remove('spinning');
  document.getElementById('play-btn').textContent = '▶';
  if (currentLesson) {
    if (!progress[currentLesson.id]) progress[currentLesson.id] = {};
    progress[currentLesson.id].time = Math.floor(audio.currentTime);
    progress[currentLesson.id].duration = Math.floor(audio.duration);
    save();
  }
});

// ── ADD LESSON ──
function saveLesson() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Ders adı zorunlu!'); return; }

  const lesson = {
    id: 'l' + Date.now(),
    name,
    category: document.getElementById('f-cat').value.trim(),
    url: document.getElementById('f-url').value.trim(),
    note: document.getElementById('f-note').value.trim(),
    addedAt: new Date().toISOString()
  };

  lessons.push(lesson);
  save();
  document.getElementById('f-name').value = '';
  document.getElementById('f-cat').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('f-note').value = '';
  toast('✓ Ders kaydedildi!');
  goHome();
}

// ── BROWSER ──
function loadBrowserUrl() {
  let url = document.getElementById('browser-url-input').value.trim();
  if (!url.startsWith('http')) url = 'https://' + url;
  document.getElementById('browser-frame').src = url;
  browserLoaded = true;
}

// ── EXPORT / IMPORT ──
function exportData() {
  const data = JSON.stringify({ lessons, progress }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'maksure-yedek-' + new Date().toISOString().split('T')[0] + '.json';
  a.click();
  toast('📤 Veriler indirildi!');
}

function triggerImport() {
  document.getElementById('import-file').click();
}

function importData(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.lessons) lessons = data.lessons;
      if (data.progress) progress = data.progress;
      save();
      toast('✓ Veriler içe aktarıldı!');
      goHome();
    } catch { toast('Hata: Geçersiz dosya'); }
  };
  reader.readAsText(file);
}

// ── UTILS ──
function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── INIT ──
goHome();
</script>
</body>
</html>
